<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background: Soft rounded square with Ink Blue color -->
  <rect width="512" height="512" rx="112" fill="#1E3A60"/>
  
  <!-- Book pages (back/shadow) -->
  <path d="M120 360 C 180 360, 220 340, 256 320 C 292 340, 332 360, 392 360 C 400 360, 408 355, 408 345 L 408 175 C 408 165, 400 160, 392 160 C 332 160, 292 140, 256 120 C 220 140, 180 160, 120 160 C 112 160, 104 165, 104 175 L 104 345 C 104 355, 112 360, 120 360 Z" fill="#FAF9F5"/>
  
  <!-- Book Binding / Center line -->
  <path d="M256 120 L256 328" stroke="#1E3A60" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Decorative Lines on Book Pages (Left page) -->
  <path d="M145 200 H225" stroke="#1E3A60" stroke-width="10" stroke-linecap="round" opacity="0.2"/>
  <path d="M145 240 H225" stroke="#1E3A60" stroke-width="10" stroke-linecap="round" opacity="0.2"/>
  <path d="M145 280 H195" stroke="#1E3A60" stroke-width="10" stroke-linecap="round" opacity="0.2"/>

  <!-- Decorative Lines on Book Pages (Right page) -->
  <path d="M287 200 H367" stroke="#1E3A60" stroke-width="10" stroke-linecap="round" opacity="0.2"/>
  <path d="M287 240 H367" stroke="#1E3A60" stroke-width="10" stroke-linecap="round" opacity="0.2"/>
  <path d="M287 280 H337" stroke="#1E3A60" stroke-width="10" stroke-linecap="round" opacity="0.2"/>

  <!-- Circuit nodes emerging from the book (Computer Science symbol) -->
  <!-- Center/top node -->
  <circle cx="256" cy="76" r="16" fill="#FAF9F5"/>
  <path d="M256 92 L256 120" stroke="#FAF9F5" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Left node -->
  <circle cx="180" cy="96" r="12" fill="#FAF9F5"/>
  <path d="M180 108 L220 135" stroke="#FAF9F5" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Right node -->
  <circle cx="332" cy="96" r="12" fill="#FAF9F5"/>
  <path d="M332 108 L292 135" stroke="#FAF9F5" stroke-width="6" stroke-linecap="round"/>
</svg>
